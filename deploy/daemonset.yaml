apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: runc-rootfs-persist-installer
  namespace: kube-system
  labels:
    app: runc-rootfs-persist-installer
spec:
  selector:
    matchLabels:
      app: runc-rootfs-persist-installer
  template:
    metadata:
      labels:
        app: runc-rootfs-persist-installer
    spec:
      hostPID: true
      initContainers:
      - name: install
        image: runc-rootfs-persist:latest
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          cp /wrapper /host/usr/local/bin/runc-rootfs-persist
          chmod +x /host/usr/local/bin/runc-rootfs-persist
          echo "runc-rootfs-persist installed on $(hostname)"
        securityContext:
          privileged: true
        volumeMounts:
        - name: host-bin
          mountPath: /host/usr/local/bin
      containers:
      - name: sleep
        image: busybox:1.36
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: 1m
            memory: 4Mi
          limits:
            cpu: 10m
            memory: 16Mi
      volumes:
      - name: host-bin
        hostPath:
          path: /usr/local/bin
          type: DirectoryOrCreate
      tolerations:
      - operator: Exists
